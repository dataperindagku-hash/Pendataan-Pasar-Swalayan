<!-- Bagian Script disesuaikan dengan logika MainActivity -->
<script>
  // Menggunakan URL yang sama dengan aplikasi Kotlin Anda
  const API_URL = "https://script.google.com/macros/s/AKfycbxoabOhILmnKHBElWFFGr3qIjmpRWVouvdGOW5YGEXke6Fnr0udZ5FCBVg4K0YhhGMZ/exec/";

  // Fungsi pengecekan status (Meniru isInternetTersedia di Kotlin)
  function isOnline() {
    return navigator.onLine;
  }

  // Fungsi login disesuaikan agar cocok dengan struktur yang diharapkan Apps Script
  async function prosesLogin() {
    const user = document.getElementById('inputUsername').value;
    const pass = document.getElementById('inputPassword').value;
    
    // Logika Login meniru alur yang ada pada aplikasi PerindagKU
    // Jika tidak ingin mengubah Apps Script, kita gunakan parameter yang sudah ada
    const loginUrl = `${API_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;

    try {
      const response = await fetch(loginUrl);
      const data = await response.json();

      if (data.status === "sukses") {
        // Simpan sesi seperti SharedPreferences di Kotlin
        localStorage.setItem("SesiPegawai", JSON.stringify({
          "NAMA_PEGAWAI": data.nama_petugas,
          "HAK_AKSES": data.bidang
        }));
        
        // Pindah ke Dashboard
        tampilkanDashboard();
      } else {
        alert(data.pesan || "Login Gagal");
      }
    } catch (error) {
      alert("Gagal terhubung ke server");
    }
  }

  function tampilkanDashboard() {
    const sesi = JSON.parse(localStorage.getItem("SesiPegawai"));
    document.getElementById('loginScreen').classList.add('d-none');
    document.getElementById('dashboardScreen').classList.remove('d-none');
    
    // Mengatur sapaan dinamis seperti fungsi aturSapaanDinamis() di Kotlin
    const jam = new Date().getHours();
    let sapaan = (jam >= 4 && jam < 11) ? "Selamat pagi," : 
                 (jam >= 11 && jam < 15) ? "Selamat siang," : 
                 (jam >= 15 && jam < 18) ? "Selamat sore," : "Selamat malam,";
    
    document.getElementById('teksSapaanWaktu').innerText = sapaan;
    document.getElementById('teksNamaPengguna').innerText = sesi.NAMA_PEGAWAI;
    document.getElementById('teksBidang').innerText = sesi.HAK_AKSES;
  }
</script>
